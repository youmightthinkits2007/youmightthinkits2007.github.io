<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Might Think He Loves You for Your Money but I Know What He Really Loves You for It's Your Brand New Leopard Skin Pillbox Hat</title>
    <style>
        * {
            font-family: 'Courier New', monospace;
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        body {
            background: url("images/back6.jpg") center/cover no-repeat fixed;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .note {
            position: relative;
            width: min(850px, 95vw);
        }
        .paperclip {
            position: absolute;
            width: min(250px, 20vw);
            top: -120px;
            left: -120px;
            transform: rotate(-45deg);
            z-index: 2;
            pointer-events: none;
        }
        .text-block {
            position: relative;
            background: #f5efe1;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.15);
            border: clamp(8px, 1.5vw, 21px) solid;
            border-image: url("images/whiteback.jpg") 30 round;
            height: clamp(300px, 60vh, 500px);
            display: flex;
            flex-direction: row;
            align-items: stretch;
        }
        .content {
            flex: 1;
            padding: clamp(10px, 3vw, 30px);
            text-align: justify;
            font-size: clamp(11px, 1.5vw, 14px);
            overflow: hidden;
        }
        h1 {
            font-size: clamp(13px, 2vw, 18px);
            font-weight: normal;
            font-style: italic;
            color: #5a4a3a;
            margin: 0 0 20px 0;
            line-height: 1.4;
            text-align: center;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: clamp(10px, 2vw, 20px);
            padding: clamp(10px, 2vw, 20px);
            border-left: 1px solid rgba(90,74,58,0.2);
        }
        .buttons a {
            font-size: clamp(11px, 1.5vw, 13px);
            color: #5a4a3a;
            text-decoration: none;
            border: 1px solid #5a4a3a;
            padding: clamp(4px, 1vw, 6px) clamp(8px, 1.5vw, 14px);
            transition: background 0.2s;
            white-space: nowrap;
            text-align: center;
        }
        .buttons a:hover {
            background: rgba(90,74,58,0.1);
        }
    </style>
</head>
<body>
    <div class="note">
        <img src="images/paperclip.png" class="paperclip" alt="">
        <div class="text-block">
            <div class="content">
                <h1>Quisquis ubique habitat, Maxime, nusquam habitat</h1>
                    <img src="images/stone.jpg" alt="" style="float:left; max-width:40%; height:auto; margin: 0 15px 10px 0;">
            </div>
            <div class="buttons">
                <a href="/journal">journal</a>
                <a href="/guestbook">guestbook</a>
                <a href="/mermaids">как стать русалкой</a>
            </div>
        </div>
    </div>
</body>
</html>
